{% extends 'base.html' %} {% block content %} <div class="auth-form">     <h1>Register</h1>     <form method="POST">         <div class="form-group">             <label>Username</label>             <input type="text" name="username" required>         </div>         <div class="form-group">             <label>Email</label>             <input type="email" name="email" required>         </div>         <div class="form-group">             <label>Password</label>             <input type="password" name="password" required>         </div>         <button type="submit" class="btn">Create Account</button>     </form>     <p>Already registered? <a href="{{ url_for('login') }}">Login here</a></p> </div> {% endblock %}
